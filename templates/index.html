.sel-group select {

}
.bestof-btn.active { background: var(--rival); border-color: var(--rival); color: #fff; }

.winner-card.team-a-wins .winner-glow { background: var(--accent); }

.winner-card.team-b-wins .winner-name { color: var(--rival); }

.winner-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.arc-card {

.scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.score-badge {

.score-badge-accent {

.score-badge.team-a .score-badge-accent { background: var(--accent); }

.badge-eyebrow {

}

/* ── PROBABILITY BARS ────────────────────────────────────── */
.prob-card {

.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }

.history-section { margin-top: 40px; }

@media (max-width: 640px) {
  .selector-grid { grid-template-columns: 1fr 1fr; }
